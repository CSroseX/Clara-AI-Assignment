version: "3"
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_clara
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678/

      - N8N_BLOCK_NODES=
      - N8N_NODES_CAN_EXECUTE_COMMAND=true
    volumes:
      - n8n_data:/home/node/.n8n
      - .:/home/node/clara-pipeline
volumes:
  n8n_data:
